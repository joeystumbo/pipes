name: C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang-format cppcheck

    - name: Run Formatter Check
      run: |
        # Instead of just formatting, we check if it is formatted correctly
        # We run clang-format and check for differences
        find . -name "*.cpp" -o -name "*.h" | xargs clang-format --dry-run --Werror

    - name: Run Linter
      run: make lint

    - name: Build
      run: make build

    - name: Run Tests
      run: make test
